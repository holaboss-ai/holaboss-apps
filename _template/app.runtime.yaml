# TODO: Replace all placeholder values with your module's config
app_id: "module-template"
name: "Module Template"
slug: "template"

services:
  app:
    build: "npm run build"
    start: "npm run start"
  redis:
    image: "redis:7-alpine"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 10

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp

integration:
  destination: "your-module"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "PLATFORM_INTEGRATION_TOKEN"
  - "WORKSPACE_API_URL"

# TODO: Replace all placeholder values with your module's config
app_id: "module-template"
name: "Module Template"
slug: "template"

lifecycle:
  setup: "corepack enable && pnpm install && pnpm run build && pnpm prune --prod"
  start: "DB_PATH=./data/module.db nohup node .output/server/index.mjs > /tmp/module-template.log 2>&1 & DB_PATH=./data/module.db nohup node .output/start-services.cjs > /tmp/module-template-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp
  tools: []  # List MCP tool names exposed by src/server/mcp.ts (e.g. "create_post")

integration:
  destination: "your-module"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "WORKSPACE_API_URL"

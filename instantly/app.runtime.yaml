app_id: "instantly-module"
name: "Instantly"
slug: "instantly"

lifecycle:
  setup: "corepack enable && pnpm install && pnpm run build && pnpm prune --prod"
  start: "DB_PATH=./data/instantly.db nohup node .output/server/index.mjs > /tmp/instantly-module.log 2>&1 & DB_PATH=./data/instantly.db nohup node .output/start-services.cjs > /tmp/instantly-module-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse
  tools:
    - "instantly_get_connection_status"
    - "instantly_list_campaigns"
    - "instantly_get_campaign"
    - "instantly_create_campaign"
    - "instantly_pause_campaign"
    - "instantly_resume_campaign"
    - "instantly_list_leads"
    - "instantly_add_lead_to_campaign"
    - "instantly_remove_lead_from_campaign"
    - "instantly_get_campaign_stats"
    - "instantly_send_test_email"
    - "instantly_sync_outreach"
    - "instantly_set_sync_enabled"

integration:
  destination: "instantly"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_APP_GRANT"
  - "WORKSPACE_DB_PATH"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_FRONTEND_URL"

# Tier 2 of the workspace data layer.
data_schema:
  version: 1
  tables:
    instantly_agent_actions:
      visibility: app_internal
      columns:
        id:                  { type: TEXT, primary_key: true }
        timestamp:           { type: INTEGER, not_null: true }
        tool_name:           { type: TEXT, not_null: true }
        args_json:           { type: TEXT, not_null: true }
        outcome:             { type: TEXT, not_null: true }
        duration_ms:         { type: INTEGER, not_null: true }
        instantly_object:    { type: TEXT }
        instantly_record_id: { type: TEXT }
        instantly_deep_link: { type: TEXT }
        result_summary:      { type: TEXT }
        error_code:          { type: TEXT }
        error_message:       { type: TEXT }
      indexes:
        - { name: idx_instantly_agent_actions_timestamp, columns: [timestamp] }
        - { name: idx_instantly_agent_actions_tool,      columns: [tool_name, timestamp] }
    instantly_campaigns:
      visibility: user_facing
      columns:
        record_id:    { type: TEXT, primary_key: true }
        name:         { type: TEXT }
        status:       { type: TEXT }
        sent_count:   { type: INTEGER }
        open_count:   { type: INTEGER }
        reply_count:  { type: INTEGER }
        bounce_count: { type: INTEGER }
        raw:          { type: TEXT }
        created_at:   { type: TEXT }
        updated_at:   { type: TEXT }
        synced_at:    { type: TEXT, not_null: true, default: "(datetime('now'))" }
      indexes:
        - { name: idx_instantly_campaigns_status, columns: [status] }
    instantly_leads:
      visibility: user_facing
      columns:
        record_id:   { type: TEXT, primary_key: true }
        email:       { type: TEXT }
        first_name:  { type: TEXT }
        last_name:   { type: TEXT }
        company:     { type: TEXT }
        status:      { type: TEXT }
        campaign_id: { type: TEXT }
        raw:         { type: TEXT }
        created_at:  { type: TEXT }
        updated_at:  { type: TEXT }
        synced_at:   { type: TEXT, not_null: true, default: "(datetime('now'))" }
      indexes:
        - { name: idx_instantly_leads_email,    columns: [email] }
        - { name: idx_instantly_leads_campaign, columns: [campaign_id] }
    instantly_sync_runs:
      visibility: app_internal
      columns:
        id:               { type: INTEGER, primary_key: true }
        started_at:       { type: TEXT, not_null: true }
        finished_at:      { type: TEXT }
        kind:             { type: TEXT, not_null: true, default: "'incremental'" }
        object_slug:      { type: TEXT, not_null: true }
        records_seen:     { type: INTEGER, not_null: true, default: "0" }
        records_inserted: { type: INTEGER, not_null: true, default: "0" }
        records_updated:  { type: INTEGER, not_null: true, default: "0" }
        errors_json:      { type: TEXT }
      indexes:
        - { name: idx_instantly_sync_runs_started, columns: [started_at] }
    instantly_api_usage:
      visibility: app_internal
      columns:
        date:               { type: TEXT, primary_key: true }
        calls_succeeded:    { type: INTEGER, not_null: true, default: "0" }
        calls_failed:       { type: INTEGER, not_null: true, default: "0" }
        calls_rate_limited: { type: INTEGER, not_null: true, default: "0" }
        updated_at:         { type: TEXT, not_null: true, default: "(datetime('now'))" }
    instantly_settings:
      visibility: app_internal
      columns:
        key:        { type: TEXT, primary_key: true }
        value:      { type: TEXT, not_null: true }
        updated_at: { type: TEXT, not_null: true, default: "(datetime('now'))" }

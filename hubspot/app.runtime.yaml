app_id: "hubspot-module"
name: "HubSpot CRM"
slug: "hubspot"

lifecycle:
  setup: "corepack enable && pnpm install && pnpm run build && pnpm prune --prod"
  start: "DB_PATH=./data/hubspot.db nohup node .output/server/index.mjs > /tmp/hubspot-module.log 2>&1 & DB_PATH=./data/hubspot.db nohup node .output/start-services.cjs > /tmp/hubspot-module-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse
  tools:
    - "hubspot_get_connection_status"
    - "hubspot_describe_schema"
    - "hubspot_search_contacts"
    - "hubspot_get_contact"
    - "hubspot_create_contact"
    - "hubspot_update_contact"
    - "hubspot_search_companies"
    - "hubspot_list_pipelines"
    - "hubspot_create_deal"
    - "hubspot_update_deal_stage"
    - "hubspot_add_note"
    - "hubspot_create_task"
    - "hubspot_sync_crm"
    - "hubspot_set_sync_enabled"

integration:
  destination: "hubspot"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_APP_GRANT"
  - "WORKSPACE_DB_PATH"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_FRONTEND_URL"

# Tier 2 of the workspace data layer.
data_schema:
  version: 1
  tables:
    hubspot_agent_actions:
      visibility: app_internal
      columns:
        id:                { type: TEXT, primary_key: true }
        timestamp:         { type: INTEGER, not_null: true }
        tool_name:         { type: TEXT, not_null: true }
        args_json:         { type: TEXT, not_null: true }
        outcome:           { type: TEXT, not_null: true }
        duration_ms:       { type: INTEGER, not_null: true }
        hubspot_object:    { type: TEXT }
        hubspot_record_id: { type: TEXT }
        hubspot_deep_link: { type: TEXT }
        result_summary:    { type: TEXT }
        error_code:        { type: TEXT }
        error_message:     { type: TEXT }
      indexes:
        - { name: idx_hubspot_agent_actions_timestamp, columns: [timestamp] }
        - { name: idx_hubspot_agent_actions_tool,      columns: [tool_name, timestamp] }
    hubspot_contacts:
      visibility: user_facing
      columns:
        record_id:       { type: TEXT, primary_key: true }
        first_name:      { type: TEXT }
        last_name:       { type: TEXT }
        email:           { type: TEXT }
        phone:           { type: TEXT }
        company:         { type: TEXT }
        job_title:       { type: TEXT }
        lifecycle_stage: { type: TEXT }
        raw:             { type: TEXT }
        created_at:      { type: TEXT }
        updated_at:      { type: TEXT }
        synced_at:       { type: TEXT, not_null: true, default: "(datetime('now'))" }
      indexes:
        - { name: idx_hubspot_contacts_email,   columns: [email] }
        - { name: idx_hubspot_contacts_company, columns: [company] }
    hubspot_companies:
      visibility: user_facing
      columns:
        record_id:      { type: TEXT, primary_key: true }
        name:           { type: TEXT }
        domain:         { type: TEXT }
        industry:       { type: TEXT }
        employee_count: { type: INTEGER }
        annual_revenue: { type: REAL }
        raw:            { type: TEXT }
        created_at:     { type: TEXT }
        updated_at:     { type: TEXT }
        synced_at:      { type: TEXT, not_null: true, default: "(datetime('now'))" }
      indexes:
        - { name: idx_hubspot_companies_domain, columns: [domain] }
    hubspot_deals:
      visibility: user_facing
      columns:
        record_id:  { type: TEXT, primary_key: true }
        name:       { type: TEXT }
        stage:      { type: TEXT }
        pipeline:   { type: TEXT }
        amount:     { type: REAL }
        close_date: { type: TEXT }
        owner_id:   { type: TEXT }
        raw:        { type: TEXT }
        created_at: { type: TEXT }
        updated_at: { type: TEXT }
        synced_at:  { type: TEXT, not_null: true, default: "(datetime('now'))" }
      indexes:
        - { name: idx_hubspot_deals_stage,    columns: [stage] }
        - { name: idx_hubspot_deals_pipeline, columns: [pipeline] }
    hubspot_sync_runs:
      visibility: app_internal
      columns:
        id:               { type: INTEGER, primary_key: true }
        started_at:       { type: TEXT, not_null: true }
        finished_at:      { type: TEXT }
        kind:             { type: TEXT, not_null: true, default: "'incremental'" }
        object_slug:      { type: TEXT, not_null: true }
        records_seen:     { type: INTEGER, not_null: true, default: "0" }
        records_inserted: { type: INTEGER, not_null: true, default: "0" }
        records_updated:  { type: INTEGER, not_null: true, default: "0" }
        errors_json:      { type: TEXT }
      indexes:
        - { name: idx_hubspot_sync_runs_started, columns: [started_at] }
    hubspot_api_usage:
      visibility: app_internal
      columns:
        date:               { type: TEXT, primary_key: true }
        calls_succeeded:    { type: INTEGER, not_null: true, default: "0" }
        calls_failed:       { type: INTEGER, not_null: true, default: "0" }
        calls_rate_limited: { type: INTEGER, not_null: true, default: "0" }
        updated_at:         { type: TEXT, not_null: true, default: "(datetime('now'))" }
    hubspot_settings:
      visibility: app_internal
      columns:
        key:        { type: TEXT, primary_key: true }
        value:      { type: TEXT, not_null: true }
        updated_at: { type: TEXT, not_null: true, default: "(datetime('now'))" }

app_id: "linkedin-module"
name: "LinkedIn"
slug: "linkedin"

lifecycle:
  setup: "corepack enable && pnpm install && pnpm run build && pnpm prune --prod"
  start: "DB_PATH=./data/module.db nohup node .output/server/index.mjs > /tmp/linkedin-module.log 2>&1 & DB_PATH=./data/module.db nohup node .output/start-services.cjs > /tmp/linkedin-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse
  tools:
    - linkedin_create_post
    - linkedin_update_post
    - linkedin_list_posts
    - linkedin_get_post
    - linkedin_publish_post
    - linkedin_get_publish_status
    - linkedin_cancel_publish
    - linkedin_delete_post
    - linkedin_get_queue_stats

integration:
  destination: "linkedin"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "WORKSPACE_API_URL"
  - "HOLABOSS_WORKSPACE_ID"
  - "WORKSPACE_DB_PATH"
  - "WORKSPACE_LINKEDIN_INTEGRATION_ID"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_APP_GRANT"

app_id: "github"
name: "GitHub"
slug: "github"

lifecycle:
  setup: "corepack enable && pnpm install && pnpm run build && pnpm prune --prod"
  start: "nohup node .output/server/index.mjs > /tmp/github-module.log 2>&1 & nohup node .output/start-services.cjs > /tmp/github-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse
  tools:
    - github_list_repos
    - github_recent_activity
    - github_get_commit
    - github_get_pr
    - github_list_releases

integration:
  destination: "github"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "PLATFORM_INTEGRATION_TOKEN"
  - "WORKSPACE_API_URL"
  - "WORKSPACE_GITHUB_INTEGRATION_ID"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_APP_GRANT"
  - "WORKSPACE_DB_PATH"

# Composio inbound triggers — runtime calls Composio triggers.create()
# at install / .delete() at uninstall, persisted via _app_trigger_subscriptions
# in workspace data.db. Handler runs as a regular TanStack Start API route.
triggers:
  - slug: GITHUB_PULL_REQUEST_EVENT
    handler: /api/triggers/pr-event
    config: {}

# Tier 2 — runtime applies before app start.
data_schema:
  version: 1
  tables:
    github_pr_events:
      visibility: user_facing
      columns:
        id:           { type: INTEGER, primary_key: true }
        trigger_id:   { type: TEXT, not_null: true }
        repo:         { type: TEXT, not_null: true }
        pr_number:    { type: INTEGER, not_null: true }
        action:       { type: TEXT, not_null: true }
        title:        { type: TEXT }
        author:       { type: TEXT }
        url:          { type: TEXT }
        payload_json: { type: TEXT, not_null: true }
        received_at:  { type: TEXT, not_null: true, default: "(datetime('now'))" }
      indexes:
        - { name: idx_github_pr_events_received, columns: [received_at] }
        - { name: idx_github_pr_events_repo,     columns: [repo, pr_number] }

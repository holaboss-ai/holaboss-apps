app_id: "github"
name: "GitHub"
slug: "github"

lifecycle:
  setup: "rm -rf node_modules && npm install --maxsockets 1 && npm run build"
  start: "nohup npm run start > /tmp/github-module.log 2>&1 & nohup npx tsx src/server/start-services.ts > /tmp/github-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse

tools:
  - name: github_list_repos
    description: "List user repositories sorted by recent activity"
    parameters:
      username: { type: string, description: "GitHub username (optional, defaults to authenticated user)" }
      limit: { type: number, description: "Max results, default 10" }
  - name: github_recent_activity
    description: "Get recent commits, PRs, and releases for a repo"
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      repo: { type: string, required: true, description: "Repository name" }
      days: { type: number, description: "Look back N days, default 7" }
  - name: github_get_commit
    description: "Get full commit details with file changes"
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      repo: { type: string, required: true, description: "Repository name" }
      sha: { type: string, required: true, description: "Commit SHA" }
  - name: github_get_pr
    description: "Get pull request details"
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      repo: { type: string, required: true, description: "Repository name" }
      number: { type: number, required: true, description: "PR number" }
  - name: github_list_releases
    description: "List releases for a repo"
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      repo: { type: string, required: true, description: "Repository name" }
      limit: { type: number, description: "Max results, default 5" }

integration:
  destination: "github"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "PLATFORM_INTEGRATION_TOKEN"
  - "WORKSPACE_API_URL"
  - "WORKSPACE_GITHUB_INTEGRATION_ID"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_APP_GRANT"

app_id: "zoominfo-module"
name: "ZoomInfo"
slug: "zoominfo"

lifecycle:
  setup: "rm -rf node_modules && pnpm install --maxsockets 1 && pnpm run build && pnpm prune --prod"
  start: "DB_PATH=./data/zoominfo.db nohup node .output/server/index.mjs > /tmp/zoominfo-module.log 2>&1 & DB_PATH=./data/zoominfo.db nohup node .output/start-services.cjs > /tmp/zoominfo-module-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse
  tools:
    - "zoominfo_get_connection_status"
    - "zoominfo_search_contacts"
    - "zoominfo_enrich_contact"
    - "zoominfo_search_companies"
    - "zoominfo_enrich_company"
    - "zoominfo_get_intent"
    - "zoominfo_get_org_chart"

integration:
  destination: "zoominfo"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_APP_GRANT"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_FRONTEND_URL"

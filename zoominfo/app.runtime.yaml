app_id: "zoominfo-module"
name: "ZoomInfo"
slug: "zoominfo"

lifecycle:
  setup: "rm -rf node_modules && pnpm install --maxsockets 1 && pnpm run build && pnpm prune --prod"
  start: "DB_PATH=./data/zoominfo.db nohup node .output/server/index.mjs > /tmp/zoominfo-module.log 2>&1 & DB_PATH=./data/zoominfo.db nohup node .output/start-services.cjs > /tmp/zoominfo-module-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse
  tools:
    - "zoominfo_get_connection_status"
    - "zoominfo_search_contacts"
    - "zoominfo_enrich_contact"
    - "zoominfo_search_companies"
    - "zoominfo_enrich_company"
    - "zoominfo_get_intent"
    - "zoominfo_get_org_chart"

integration:
  destination: "zoominfo"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_APP_GRANT"
  - "WORKSPACE_DB_PATH"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_FRONTEND_URL"

# Tier 2 of the workspace data layer. Read-through app: only the
# audit log is persisted locally; ZoomInfo data is never mirrored
# (license terms forbid).
data_schema:
  version: 1
  tables:
    zoominfo_agent_actions:
      visibility: app_internal
      columns:
        id:                 { type: TEXT, primary_key: true }
        timestamp:          { type: INTEGER, not_null: true }
        tool_name:          { type: TEXT, not_null: true }
        args_json:          { type: TEXT, not_null: true }
        outcome:            { type: TEXT, not_null: true }
        duration_ms:        { type: INTEGER, not_null: true }
        zoominfo_object:    { type: TEXT }
        zoominfo_record_id: { type: TEXT }
        zoominfo_deep_link: { type: TEXT }
        result_summary:     { type: TEXT }
        error_code:         { type: TEXT }
        error_message:      { type: TEXT }
      indexes:
        - { name: idx_zoominfo_agent_actions_timestamp, columns: [timestamp] }
        - { name: idx_zoominfo_agent_actions_tool,      columns: [tool_name, timestamp] }

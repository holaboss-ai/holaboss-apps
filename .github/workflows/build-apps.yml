name: Build & Release App Archives

on:
  push:
    # Two tag flows are supported in parallel during the changesets pilot:
    #
    #   - `v[0-9]*`         → legacy lockstep release: builds every module
    #                         in `LEGACY_MODULES` (twitter is intentionally
    #                         excluded — it ships independently now). The
    #                         `[0-9]` suffix prevents future module names
    #                         starting with `v` (`voltron`, etc.) from
    #                         double-matching this pattern.
    #   - `*@[0-9]*`        → per-app changesets release (e.g.
    #                         `twitter@0.3.0`): builds only the named
    #                         module across all targets.
    tags: ["v[0-9]*", "*@[0-9]*"]
  workflow_dispatch:
    inputs:
      modules:
        description: "Modules to build (comma-separated, or 'all')"
        default: "all"
      targets:
        description: "Target platforms (comma-separated)"
        default: "linux-x64,darwin-arm64,win32-x64"

concurrency:
  group: build-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_app: ${{ steps.resolve.outputs.release_app }}
    steps:
      - name: Resolve build matrix
        id: resolve
        env:
          # `LEGACY_MODULES` is what `v*` lockstep tags still build. Once a
          # module migrates to changesets it MUST be removed from this list,
          # otherwise a stray `v*` tag will double-build it.
          LEGACY_MODULES: "linkedin,reddit,gmail,github,sheets,calcom,attio,apollo,zoominfo,instantly,hubspot"
          ALL_TARGETS: "linux-x64,darwin-arm64,win32-x64"
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          MODULES="${{ inputs.modules || '' }}"
          TARGETS="${{ inputs.targets || 'linux-x64,darwin-arm64,win32-x64' }}"

          # Always derive release_tag / release_app from the ref when it
          # looks like a per-app tag, even if `inputs.modules` was passed
          # explicitly — `release-changesets.yml` dispatches us with
          # `--ref <tag> -f modules=<name>`, and the per-app release step
          # depends on these outputs to name the GitHub Release correctly.
          if [[ "$REF" == *@[0-9]* ]]; then
            echo "release_tag=$REF" >> "$GITHUB_OUTPUT"
            echo "release_app=${REF%@*}" >> "$GITHUB_OUTPUT"
          elif [[ "$REF" =~ ^v[0-9] ]]; then
            echo "release_tag=$REF" >> "$GITHUB_OUTPUT"
          fi

          if [[ -z "$MODULES" || "$MODULES" == "all" ]]; then
            if [[ "$REF" =~ ^v[0-9] ]]; then
              # Legacy `v<digit>*` tag — build everything except apps that
              # have already migrated to changesets.
              MODULES="$LEGACY_MODULES"
            elif [[ "$REF" == *@[0-9]* ]]; then
              # Changesets per-app tag — extract the module name from the
              # `<name>@<semver>` prefix. e.g. `twitter@0.3.0` → twitter.
              MODULES="${REF%@*}"
            else
              # workflow_dispatch with `all` — fall back to legacy list so we
              # don't accidentally rebuild migrated apps.
              MODULES="$LEGACY_MODULES"
            fi
          fi

          # Build matrix JSON: [{module: "twitter", target: "linux-x64"}, ...]
          MATRIX=$(echo "$MODULES" | tr ',' '\n' | while read -r mod; do
            [[ -z "$mod" ]] && continue
            echo "$TARGETS" | tr ',' '\n' | while read -r tgt; do
              echo "{\"module\":\"$mod\",\"target\":\"$tgt\"}"
            done
          done | jq -sc '{include: .}')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Build ${{ matrix.module }} (${{ matrix.target }})
        run: ./scripts/build-archive.sh ${{ matrix.module }} --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-${{ matrix.target }}
          path: dist/*.tar.gz
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/') && !cancelled()
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect archives
        run: |
          mkdir -p release/
          find artifacts/ -name "*.tar.gz" -exec cp {} release/ \;
          echo "=== Archives ==="
          ls -lh release/

      - name: Create GitHub Release (legacy lockstep)
        if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '@') }}
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          body: |
            ## App Archives

            Pre-built module archives — extract and run, no install needed.

            **Usage:**
            ```bash
            tar xzf twitter-module-linux-x64.tar.gz
            node .output/server/index.mjs &        # Web server
            node .output/start-services.cjs &      # MCP + worker
            ```

            | Suffix | Platform |
            |--------|----------|
            | `linux-x64` | Linux sandbox (Docker/Fly) |
            | `darwin-arm64` | macOS Apple Silicon |
            | `win32-x64` | Windows |

      - name: Create GitHub Release (per-app changesets)
        if: contains(github.ref, '@')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          name: ${{ needs.prepare.outputs.release_tag }}
          body: |
            ## ${{ needs.prepare.outputs.release_app }} module

            Pre-built archives for `${{ needs.prepare.outputs.release_app }}` only — extract and run, no install needed.

            **Usage:**
            ```bash
            tar xzf ${{ needs.prepare.outputs.release_app }}-module-linux-x64.tar.gz
            node .output/server/index.mjs &        # Web server
            node .output/start-services.cjs &      # MCP + worker
            ```

            See per-app `CHANGELOG.md` for what changed in this release.

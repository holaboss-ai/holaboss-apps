name: Build & Release App Archives

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      modules:
        description: "Modules to build (comma-separated, or 'all')"
        default: "all"
      targets:
        description: "Target platforms (comma-separated)"
        default: "linux-x64,darwin-arm64,win32-x64"

concurrency:
  group: build-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve build matrix
        id: resolve
        env:
          ALL_MODULES: "twitter,linkedin,reddit,gmail,github,sheets"
          ALL_TARGETS: "linux-x64,darwin-arm64,win32-x64"
        run: |
          MODULES="${{ inputs.modules || 'all' }}"
          TARGETS="${{ inputs.targets || 'linux-x64,darwin-arm64,win32-x64' }}"

          [[ "$MODULES" == "all" ]] && MODULES="$ALL_MODULES"

          # Build matrix JSON: [{module: "twitter", target: "linux-x64"}, ...]
          MATRIX=$(echo "$MODULES" | tr ',' '\n' | while read -r mod; do
            echo "$TARGETS" | tr ',' '\n' | while read -r tgt; do
              echo "{\"module\":\"$mod\",\"target\":\"$tgt\"}"
            done
          done | jq -sc '{include: .}')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Build ${{ matrix.module }} (${{ matrix.target }})
        run: ./scripts/build-archive.sh ${{ matrix.module }} --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-${{ matrix.target }}
          path: dist/*.tar.gz
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v') && !cancelled()
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect archives
        run: |
          mkdir -p release/
          find artifacts/ -name "*.tar.gz" -exec cp {} release/ \;
          echo "=== Archives ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          body: |
            ## App Archives

            Pre-built module archives — extract and run, no install needed.

            **Usage:**
            ```bash
            tar xzf twitter-module-linux-x64.tar.gz
            node .output/server/index.mjs &        # Web server
            node .output/start-services.cjs &      # MCP + worker
            ```

            | Suffix | Platform |
            |--------|----------|
            | `linux-x64` | Linux sandbox (Docker/Fly) |
            | `darwin-arm64` | macOS Apple Silicon |
            | `win32-x64` | Windows |

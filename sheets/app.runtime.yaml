app_id: "sheets"
name: "Google Sheets"
slug: "sheets"

lifecycle:
  setup: "rm -rf node_modules && npm install --maxsockets 1"
  start: "DB_PATH=./data/module.db npx tsx src/server/start-services.ts"
  stop: "kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /health
    timeout_s: 30

mcp:
  enabled: true
  transport: streamable-http
  port: 3099
  path: /mcp

integration:
  destination: "google"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "PLATFORM_INTEGRATION_TOKEN"
  - "WORKSPACE_API_URL"
  - "WORKSPACE_GOOGLE_INTEGRATION_ID"

app_id: "sheets"
name: "Google Sheets"
slug: "sheets"

lifecycle:
  setup: "corepack enable && pnpm install && pnpm run build && pnpm prune --prod"
  start: "DB_PATH=./data/module.db nohup node .output/server/index.mjs > /tmp/sheets-module.log 2>&1 & DB_PATH=./data/module.db nohup node .output/start-services.cjs > /tmp/sheets-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse
  tools:
    - sheets_get_info
    - sheets_create_spreadsheet
    - sheets_list_spreadsheets
    - sheets_read_rows
    - sheets_read_range
    - sheets_update_cell
    - sheets_append_row
    - sheets_update_row
    - sheets_delete_row
    - sheets_add_sheet

integration:
  destination: "googlesheets"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "WORKSPACE_API_URL"
  - "HOLABOSS_WORKSPACE_ID"
  - "WORKSPACE_GOOGLE_INTEGRATION_ID"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_APP_GRANT"

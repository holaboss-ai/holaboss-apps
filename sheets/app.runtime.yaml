app_id: "sheets"
name: "Google Sheets"
slug: "sheets"

lifecycle:
  setup: "rm -rf node_modules && npm install --maxsockets 1 && npm run build"
  start: "DB_PATH=./data/module.db nohup npm run start > /tmp/sheets-module.log 2>&1 & DB_PATH=./data/module.db nohup npx tsx src/server/start-services.ts > /tmp/sheets-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse

tools:
  - name: sheets_create_spreadsheet
    description: "Create a new Google Sheets spreadsheet with headers and optional initial rows"
    parameters:
      title: { type: string, required: true, description: "Spreadsheet title" }
      headers: { type: array, required: true, description: "Column header names" }
      rows: { type: array, description: "Optional initial data rows" }
  - name: sheets_list_spreadsheets
    description: "List the user's Google Sheets spreadsheets, optionally search by name"
    parameters:
      query: { type: string, description: "Search term to filter by name" }
  - name: sheets_get_info
    description: "Get sheet title, headers, and row count"
    parameters:
      sheet_id: { type: string, required: true, description: "Google Sheet ID" }
  - name: sheets_read_rows
    description: "Read all rows as objects (header-keyed). Filter by column value with partial matching."
    parameters:
      sheet_id: { type: string, required: true, description: "Google Sheet ID" }
      range: { type: string, description: "Sheet range, default Sheet1" }
      filter_column: { type: string, description: "Column name to filter by" }
      filter_value: { type: string, description: "Value to match (partial/contains)" }
  - name: sheets_read_range
    description: "Read raw cell values from a specific range"
    parameters:
      sheet_id: { type: string, required: true, description: "Google Sheet ID" }
      range: { type: string, required: true, description: "Range like Sheet1!A1:C10" }
  - name: sheets_update_cell
    description: "Update a single cell value"
    parameters:
      sheet_id: { type: string, required: true, description: "Google Sheet ID" }
      range: { type: string, required: true, description: "Cell range like Sheet1!D5" }
      value: { type: string, required: true, description: "New value" }
  - name: sheets_update_row
    description: "Update an entire row by row number with column-value pairs"
    parameters:
      sheet_id: { type: string, required: true, description: "Google Sheet ID" }
      row_number: { type: number, required: true, description: "Row number (first data row is 2)" }
      values: { type: object, required: true, description: "Column name → new value pairs" }
      range: { type: string, description: "Sheet tab name, default Sheet1" }
  - name: sheets_append_row
    description: "Append a new row to the sheet"
    parameters:
      sheet_id: { type: string, required: true, description: "Google Sheet ID" }
      values: { type: array, required: true, description: "Array of cell values" }
      range: { type: string, description: "Sheet range, default Sheet1" }
  - name: sheets_delete_row
    description: "Delete a row by row number"
    parameters:
      sheet_id: { type: string, required: true, description: "Google Sheet ID" }
      row_number: { type: number, required: true, description: "Row number to delete" }
      range: { type: string, description: "Sheet tab name, default Sheet1" }
  - name: sheets_add_sheet
    description: "Add a new sheet tab to an existing spreadsheet"
    parameters:
      sheet_id: { type: string, required: true, description: "Google Sheet ID" }
      title: { type: string, required: true, description: "Name for the new tab" }

integration:
  destination: "googlesheets"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "PLATFORM_INTEGRATION_TOKEN"
  - "WORKSPACE_API_URL"
  - "HOLABOSS_WORKSPACE_ID"
  - "WORKSPACE_GOOGLE_INTEGRATION_ID"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_APP_GRANT"

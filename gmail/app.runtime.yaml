app_id: "gmail"
name: "Gmail"
slug: "gmail"

lifecycle:
  setup: "corepack enable && pnpm install && NODE_OPTIONS=--max-old-space-size=384 pnpm run build && pnpm prune --prod"
  start: "DB_PATH=./data/module.db nohup node .output/server/index.mjs > /tmp/gmail-module.log 2>&1 & DB_PATH=./data/module.db nohup node .output/start-services.cjs > /tmp/gmail-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse
  tools:
    - gmail_search
    - gmail_get_thread
    - gmail_open_thread
    - gmail_draft_reply
    - gmail_send_draft
    - gmail_update_draft
    - gmail_get_send_status
    - gmail_delete_draft
    - gmail_list_drafts

integration:
  destination: "gmail"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "WORKSPACE_API_URL"
  - "HOLABOSS_WORKSPACE_ID"
  - "WORKSPACE_GOOGLE_INTEGRATION_ID"
  - "HOLABOSS_INTEGRATION_BROKER_URL"
  - "HOLABOSS_APP_GRANT"

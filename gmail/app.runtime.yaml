app_id: "gmail"
name: "Gmail"
slug: "gmail"

lifecycle:
  setup: "rm -rf node_modules && npm install --maxsockets 1 && npm run build"
  start: "npm start"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /api/health
    timeout_s: 30

mcp:
  enabled: true
  transport: streamable-http
  port: 3000
  path: /api/mcp

integration:
  destination: "google"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "PLATFORM_INTEGRATION_TOKEN"
  - "WORKSPACE_API_URL"
  - "WORKSPACE_GOOGLE_INTEGRATION_ID"

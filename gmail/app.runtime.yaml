app_id: "gmail"
name: "Gmail"
slug: "gmail"

lifecycle:
  setup: "rm -rf node_modules && npm install --maxsockets 1 && NODE_OPTIONS=--max-old-space-size=384 npm run build"
  start: "DB_PATH=./data/module.db nohup npm run start > /tmp/gmail-module.log 2>&1 & DB_PATH=./data/module.db nohup npx tsx src/server/start-services.ts > /tmp/gmail-services.log 2>&1 &"
  stop: "kill $(lsof -t -i :${PORT:-3000} 2>/dev/null) 2>/dev/null || true; kill $(lsof -t -i :${MCP_PORT:-3099} 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp/sse

tools:
  - name: gmail_search
    description: "Search Gmail threads by query (from:X, to:X, subject:X, or free text)"
    parameters:
      query: { type: string, required: true, description: "Gmail search query" }
      max_results: { type: number, description: "Max results, default 10" }
  - name: gmail_get_thread
    description: "Read a full Gmail thread with all messages"
    parameters:
      thread_id: { type: string, required: true, description: "Gmail thread ID" }
  - name: gmail_draft_reply
    description: "Create an email draft (stored locally, NOT sent). Use gmail_send_draft to send."
    parameters:
      to_email: { type: string, required: true, description: "Recipient email" }
      subject: { type: string, description: "Email subject" }
      body: { type: string, required: true, description: "Email body text" }
      thread_id: { type: string, description: "Gmail thread ID if this is a reply" }
  - name: gmail_send_draft
    description: "Send a pending draft via Gmail API"
    parameters:
      draft_id: { type: string, required: true, description: "Local draft ID" }
  - name: gmail_list_drafts
    description: "List email drafts"
    parameters:
      status: { type: string, description: "Filter by status (pending/sent/discarded), default: pending" }
      limit: { type: number, description: "Max results, default 20" }

integration:
  destination: "google"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "PLATFORM_INTEGRATION_TOKEN"
  - "WORKSPACE_API_URL"
  - "WORKSPACE_GOOGLE_INTEGRATION_ID"

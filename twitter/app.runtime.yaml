app_id: "twitter-module"
name: "Twitter/X"
slug: "twitter"

lifecycle:
  setup: "npm install && npm run build"
  start: "PORT=8080 MCP_PORT=3099 DB_PATH=./data/module.db nohup npm run start > /tmp/twitter-module.log 2>&1 &"
  stop: "kill $(lsof -t -i :8080 -i :3099 2>/dev/null) 2>/dev/null || true"

healthchecks:
  mcp:
    path: /mcp/health
    timeout_s: 30

mcp:
  enabled: true
  transport: http-sse
  port: 3099
  path: /mcp

integration:
  destination: "twitter"
  credential_source: "platform"
  holaboss_user_id_required: true

env_contract:
  - "HOLABOSS_USER_ID"
  - "PLATFORM_INTEGRATION_TOKEN"
  - "WORKSPACE_API_URL"
  - "WORKSPACE_X_INTEGRATION_ID"
